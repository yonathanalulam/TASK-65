spring:
  application:
    name: culinary-coach-api

  datasource:
    url: jdbc:mysql://localhost:3306/culinary_coach?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: cc_user
    password: cc_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=50000,expireAfterAccess=5m

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: false
        same-site: lax

app:
  security:
    bcrypt-strength: 12
    max-sessions-per-user: 3
    max-sessions-per-device: 2
    idle-timeout-minutes: 30
    absolute-lifetime-hours: 12
    lockout-duration-minutes: 15
    max-failed-attempts: 5
    failed-attempt-window-minutes: 30
    password-min-length: 12
    password-history-count: 5
    signature-validity-minutes: 5
    nonce-cleanup-interval-minutes: 10
    captcha-failure-threshold-login: 3
    captcha-failure-threshold-request: 10
    captcha-failure-window-minutes: 10
    captcha-expiry-minutes: 5
  rate-limit:
    authenticated-per-minute: 60
    unauthenticated-per-minute: 20
    admin-per-minute: 30
    burst-capacity: 10
    burst-period-seconds: 2
  mfa:
    issuer: CulinaryCoach
    encryption-key: ${MFA_ENCRYPTION_KEY:default-dev-key-change-in-production-32ch}
  audio:
    cache-quota-bytes: 2147483648
    cache-validity-days: 30
    max-segment-size-bytes: 262144000
    allowed-audio-types: mp3,aac,m4a,ogg
