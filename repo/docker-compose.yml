services:
  mysql:
    image: mysql:8.0
    container_name: culinary-coach-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: culinary_coach
      MYSQL_USER: cc_user
      MYSQL_PASSWORD: cc_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=caching_sha2_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost && mysql -u cc_user -pcc_password -e 'SELECT 1' culinary_coach"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: culinary-coach-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      APP_BOOTSTRAP_ADMIN_PASSWORD: "Admin@12345678!"
      MFA_ENCRYPTION_KEY: "docker-dev-encryption-key-32chars!"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/auth/csrf-token || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: culinary-coach-ui
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

  adminer:
    image: adminer:4
    container_name: culinary-coach-adminer
    ports:
      - "8081:8080"
    depends_on:
      - mysql

volumes:
  mysql_data:
